<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="MusicLog — Sign in or create an account.">
  <title>MusicLog — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/login.css">
  <link rel="stylesheet" href="css/home.css">

</head>
<body data-page="login">

  <div class="login-page">

    <!-- ── CARD ── -->
    <main class="login-card" id="main-content">

      <!-- Logo -->
      <a href="index.html" class="login-logo" aria-label="MusicLog — go to home">
        <span class="login-logo__icon" aria-hidden="true">♪</span>
        MUSICLOG
      </a>

      <p class="login-tagline">Track every listen. Rate everything.</p>

      <!-- Tab switcher -->
      <div class="login-tabs" role="tablist" aria-label="Sign in or create account">
        <button
          class="login-tab login-tab--active"
          role="tab"
          id="tab-login"
          aria-selected="true"
          aria-controls="panel-login"
          data-tab="login"
        >Sign In</button>
        <button
          class="login-tab"
          role="tab"
          id="tab-register"
          aria-selected="false"
          aria-controls="panel-register"
          data-tab="register"
        >Create Account</button>
      </div>

      <!-- ── SIGN IN ── -->
      <section
        class="login-panel login-panel--active"
        id="panel-login"
        role="tabpanel"
        aria-labelledby="tab-login"
      >
        <form class="login-form" id="login-form" novalidate aria-label="Sign in">

          <div class="form-group">
            <label class="form-label" for="login-username">Username</label>
            <input
              class="form-input"
              type="text"
              id="login-username"
              name="username"
              placeholder="Enter your username"
              required
              minlength="2"
              maxlength="32"
              autocomplete="username"
              aria-describedby="err-login-username"
            >
            <span class="form-error" id="err-login-username" role="alert" aria-live="polite"></span>
          </div>

          <button type="submit" class="btn btn--accent btn--full">Sign In</button>

          <div class="form-feedback" id="login-feedback" role="alert" aria-live="assertive"></div>

        </form>

        <p class="login-switch">
          No account?
          <button type="button" class="login-switch__btn" id="go-register">Create one →</button>
        </p>
      </section>

      <!-- ── CREATE ACCOUNT ── -->
      <section
        class="login-panel"
        id="panel-register"
        role="tabpanel"
        aria-labelledby="tab-register"
        hidden
      >
        <form class="login-form" id="register-form" novalidate aria-label="Create account">

          <!-- Username — type="text" -->
          <div class="form-group">
            <label class="form-label" for="reg-username">
              Username <abbr title="required" aria-label="required">*</abbr>
            </label>
            <input
              class="form-input"
              type="text"
              id="reg-username"
              name="username"
              placeholder="Choose a username"
              required
              minlength="2"
              maxlength="32"
              pattern="[A-Za-z0-9_\-]+"
              autocomplete="username"
              aria-describedby="err-reg-username hint-reg-username"
            >
            <span class="form-hint" id="hint-reg-username">Letters, numbers, _ and - only.</span>
            <span class="form-error" id="err-reg-username" role="alert" aria-live="polite"></span>
          </div>

          <!-- Email — type="email" -->
          <div class="form-group">
            <label class="form-label" for="reg-email">
              Email <abbr title="required" aria-label="required">*</abbr>
            </label>
            <input
              class="form-input"
              type="email"
              id="reg-email"
              name="email"
              placeholder="your@email.com"
              required
              autocomplete="email"
              aria-describedby="err-reg-email"
            >
            <span class="form-error" id="err-reg-email" role="alert" aria-live="polite"></span>
          </div>

          <button type="submit" class="btn btn--accent btn--full">Create Account</button>

          <div class="form-feedback" id="register-feedback" role="alert" aria-live="assertive"></div>

        </form>

        <p class="login-switch">
          Already have an account?
          <button type="button" class="login-switch__btn" id="go-login">Sign in →</button>
        </p>
      </section>

      <p class="login-note">
        Your data is stored locally in this browser — nothing is sent anywhere.
      </p>

    </main>

    <nav class="login-back" aria-label="Return to site">
      <a href="index.html" class="login-back__link">← Back to site</a>
    </nav>

  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
